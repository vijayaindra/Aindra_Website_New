<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiNDRA - AI-Powered Cancer Detection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    :root {
      --product-shell-offset-mobile: 80px;
      --product-shell-offset-desktop: 96px;
    }

    .product-hero-section {
      position: relative;
      width: 100%;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: calc(100svh - var(--product-shell-offset-mobile));
    }

    .product-hero-selector {
      padding-top: 28px;
      padding-bottom: 30px;
    }

    .product-hero-body {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      padding-top: 12px;
      padding-bottom: 34px;
    }

    .product-hero-title {
      font-size: clamp(42px, 4.2vw, 72px);
      line-height: 1.05;
    }

    .product-hero-description {
      font-size: clamp(20px, 1.3vw, 22px);
      line-height: 1.55;
      max-width: 560px;
    }

    .product-hero-image-wrap {
      width: min(42vw, 620px);
      height: min(42vw, 620px);
      min-width: 280px;
      min-height: 280px;
    }

    .product-hero-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .product-tabs-wrapper {
      margin-top: 0;
      border-top: 1px solid #f3f4f6;
      background: #fff;
    }

    @media (min-width: 768px) {
      .product-hero-section {
        min-height: calc(100svh - var(--product-shell-offset-desktop));
      }

      .product-hero-body {
        padding-top: 22px;
        padding-bottom: 24px;
      }
    }

    @media (min-width: 768px) and (max-height: 820px) {
      .product-hero-section {
        min-height: auto;
      }

      .product-hero-body {
        align-items: flex-start;
        padding-top: 14px;
        padding-bottom: 18px;
      }

      .product-hero-image-wrap {
        width: min(36vw, 520px);
        height: min(36vw, 520px);
      }
    }
  </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
